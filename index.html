<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0c0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Films" />
  <title>Explorateur de films</title>
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=8.8.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png?v=8.8.0" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png?v=8.8.0" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png?v=8.8.0" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <!-- Bump CSS/JS query strings together when deploying. -->
  <link rel="stylesheet" href="style.css?v=8.8.0" />
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <div class="brand">
        <svg class="brand__logo" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
          <circle cx="24" cy="24" r="20" fill="var(--panel)" />
          <g>
            <path d="M24.00 6.00L24.00 15.70L31.19 19.85Z" fill="var(--accent)" fill-opacity="0.9" />
            <path d="M39.59 15.00L31.19 19.85L31.19 28.15Z" fill="var(--accent)" fill-opacity="0.55" />
            <path d="M39.59 33.00L31.19 28.15L24.00 32.30Z" fill="var(--accent)" fill-opacity="0.9" />
            <path d="M24.00 42.00L24.00 32.30L16.81 28.15Z" fill="var(--accent)" fill-opacity="0.55" />
            <path d="M8.41 33.00L16.81 28.15L16.81 19.85Z" fill="var(--accent)" fill-opacity="0.9" />
            <path d="M8.41 15.00L16.81 19.85L24.00 15.70Z" fill="var(--accent)" fill-opacity="0.55" />
          </g>
          <circle cx="24" cy="24" r="18" fill="none" stroke="var(--accent)" stroke-width="2" />
          <circle cx="24" cy="24" r="5.2" fill="var(--bg)" />
        </svg>
        <div class="brand__text">
          <h1>Explorateur de films</h1>
          <p class="brand__subtitle">Ma bibliothèque</p>
        </div>
      </div>
      <div class="app-search">
        <svg class="app-search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
          <circle cx="11" cy="11" r="7" />
          <path d="M21 21l-4.3-4.3" />
        </svg>
        <label class="visually-hidden" for="searchInput">Rechercher des films</label>
        <input id="searchInput" type="search" placeholder="Rechercher un titre, acteur, réalisateur, pays…" autocomplete="off" />
      </div>
    </div>
  </header>

  <main class="app-shell">
    <aside id="filterPanel" class="filter-panel" aria-label="Filtres des films" aria-hidden="true" tabindex="-1" inert>
      <div class="filter-panel__handle" aria-hidden="true"></div>
      <div class="filter-panel__header">
        <div>
          <p class="eyebrow">Affiner</p>
          <h2>Filtres</h2>
        </div>
        <button id="closeFilters" class="icon-button" type="button" aria-label="Fermer les filtres">×</button>
      </div>

      <p id="filterResultCount" class="filter-panel__count" aria-live="polite"></p>

      <div class="filter-panel__body">
        <nav class="filter-jump-nav" aria-label="Catégories de filtres">
          <button class="filter-jump-nav__button is-active" type="button" data-filter-category="genre" aria-pressed="true">
            <span>Genres</span><span id="genreSelectedCount" class="filter-jump-nav__count" hidden>0</span>
          </button>
          <button class="filter-jump-nav__button" type="button" data-filter-category="actor" aria-pressed="false">
            <span>Acteurs</span><span id="actorSelectedCount" class="filter-jump-nav__count" hidden>0</span>
          </button>
          <button class="filter-jump-nav__button" type="button" data-filter-category="director" aria-pressed="false">
            <span>Réalisateurs</span><span id="directorSelectedCount" class="filter-jump-nav__count" hidden>0</span>
          </button>
          <button class="filter-jump-nav__button" type="button" data-filter-category="saga" aria-pressed="false">
            <span>Sagas</span><span id="sagaSelectedCount" class="filter-jump-nav__count" hidden>0</span>
          </button>
        </nav>

        <p class="filter-hint">Les catégories se cumulent. Dans chacune, exigez <strong>au moins une</strong> valeur ou <strong>toutes</strong>.</p>

        <section id="genreSection" class="filter-section filter-category-panel" data-filter-panel="genre" aria-label="Filtre par genre">
          <div class="filter-section__bar">
            <div id="genreMatchMode" class="match-toggle" role="group" aria-label="Correspondance des genres">
              <button class="match-toggle__option" type="button" data-match-value="any" aria-pressed="false">Au moins un</button>
              <button class="match-toggle__option is-active" type="button" data-match-value="all" aria-pressed="true">Tous</button>
            </div>
          </div>
          <div id="genreList" class="filter-list">Chargement…</div>
        </section>

        <section id="actorSection" class="filter-section filter-category-panel" data-filter-panel="actor" hidden aria-label="Filtre par acteur">
          <div class="filter-section__bar">
            <div id="actorMatchMode" class="match-toggle" role="group" aria-label="Correspondance des acteurs">
              <button class="match-toggle__option" type="button" data-match-value="any" aria-pressed="false">Au moins un</button>
              <button class="match-toggle__option is-active" type="button" data-match-value="all" aria-pressed="true">Tous</button>
            </div>
            <label class="visually-hidden" for="actorFilterSearch">Filtrer la liste des acteurs</label>
            <input id="actorFilterSearch" type="search" placeholder="Rechercher un acteur…" autocomplete="off" />
          </div>
          <div id="actorList" class="filter-list filter-list--searchable">Chargement…</div>
        </section>

        <section id="directorSection" class="filter-section filter-category-panel" data-filter-panel="director" hidden aria-label="Filtre par réalisateur">
          <div class="filter-section__bar">
            <div id="directorMatchMode" class="match-toggle" role="group" aria-label="Correspondance des réalisateurs">
              <button class="match-toggle__option" type="button" data-match-value="any" aria-pressed="false">Au moins un</button>
              <button class="match-toggle__option is-active" type="button" data-match-value="all" aria-pressed="true">Tous</button>
            </div>
            <label class="visually-hidden" for="directorFilterSearch">Filtrer la liste des réalisateurs</label>
            <input id="directorFilterSearch" type="search" placeholder="Rechercher un réalisateur…" autocomplete="off" />
          </div>
          <div id="directorList" class="filter-list filter-list--searchable">Chargement…</div>
        </section>

        <section id="sagaSection" class="filter-section filter-category-panel" data-filter-panel="saga" hidden aria-label="Filtre par saga">
          <p class="filter-hint">Une saga par film : ajoutez-en plusieurs pour les cumuler (au moins une).</p>
          <div id="sagaList" class="filter-list">Chargement…</div>
        </section>

        <div class="filter-panel__actions">
          <button id="clearFilters" class="secondary-button" type="button">Tout effacer</button>
          <button id="reloadData" class="secondary-button" type="button">Recharger les données</button>
        </div>
      </div>

      <div class="filter-panel__footer">
        <button id="applyFilters" class="primary-button" type="button">Afficher les résultats</button>
      </div>
    </aside>

    <div id="filterBackdrop" class="filter-backdrop" hidden></div>

    <section class="content-panel" aria-live="polite">
      <div class="mobile-toolbar">
        <label class="visually-hidden" for="sortSelect">Trier les films</label>
        <select id="sortSelect">
          <option value="position-desc" selected>Ajout récent</option>
          <option value="position-asc">Ajout ancien</option>
          <option value="title-asc">Titre A → Z</option>
          <option value="originalTitle-asc">Titre original A → Z</option>
          <option value="runtime-asc">Durée courte → longue</option>
          <option value="runtime-desc">Durée longue → courte</option>
          <option value="imdbRating-desc">IMDb meilleure note</option>
          <option value="year-desc">Sortie récente</option>
          <option value="year-asc">Sortie ancienne</option>
          <option value="country-asc">Pays A → Z</option>
        </select>

        <button id="toggleSelectionPanel" class="secondary-button selection-toolbar-button" type="button" aria-expanded="false" aria-controls="selectionPanel">
          Sélection <span id="selectionCount" class="button-badge">0</span>
        </button>

        <button id="openFilters" class="primary-button mobile-filter-button" type="button">
          Filtres <span id="filterCount" class="button-badge">0</span>
        </button>
      </div>

      <div id="status" class="status-message">Chargement de la bibliothèque…</div>
      <div id="diagnostics" class="diagnostics" hidden></div>
      <div id="resultSummary" class="result-summary" hidden></div>
      <div id="activeFilters" class="active-filters"></div>
      <section id="selectionPanel" class="selection-panel" aria-labelledby="selectionPanelHeading" hidden></section>
      <div id="movieGrid" class="movie-grid" data-view-mode="cards"></div>
    </section>
  </main>

  <button id="backToTop" class="back-to-top" type="button" aria-label="Revenir en haut de la page" hidden>↑</button>

  <script src="script.js?v=8.8.0"></script>
</body>
</html>
